<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-deep:      #0a1628;
    --bg-sidebar:   #111b2e;
    --bg-chat:      #0d1e35;
    --bg-message-in:#1a2d47;
    --bg-message-out:#005c4b;
    --bg-input:     #182638;
    --bg-card:      #162035;
    --accent:       #00a884;
    --accent-light: #00cf9f;
    --text-primary: #e9edef;
    --text-secondary:#8696a0;
    --text-muted:   #667781;
    --border:       #1f3044;
    --bubble-shadow:0 1px 2px rgba(0,0,0,.4);
    --font: 'Plus Jakarta Sans', sans-serif;
    --radius: 12px;
    --sidebar-w: 360px;
  }

  html, body { height: 100%; font-family: var(--font); background: var(--bg-deep); color: var(--text-primary); overflow: hidden; }

  /* ─── AUTH SCREEN ─── */
  #authScreen {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 30% 20%, #0e2a4a 0%, #0a1628 60%);
    z-index: 100;
  }
  .auth-card {
    background: var(--bg-sidebar);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 36px;
    width: 360px;
    box-shadow: 0 24px 60px rgba(0,0,0,.5);
    animation: slideUp .4s ease;
  }
  @keyframes slideUp { from { opacity:0; transform:translateY(24px) } to { opacity:1; transform:none } }

  .auth-logo {
    display: flex; align-items: center; gap: 10px; margin-bottom: 28px; justify-content: center;
  }
  .auth-logo svg { width: 38px; height: 38px; }
  .auth-logo span { font-size: 22px; font-weight: 700; color: var(--accent-light); letter-spacing: -.5px; }

  .auth-tabs { display: flex; gap: 4px; background: var(--bg-input); border-radius: 10px; padding: 4px; margin-bottom: 24px; }
  .auth-tab {
    flex: 1; padding: 8px; text-align: center; font-size: 13px; font-weight: 600;
    color: var(--text-secondary); cursor: pointer; border-radius: 8px; transition: all .2s;
  }
  .auth-tab.active { background: var(--accent); color: #fff; }

  .auth-group { margin-bottom: 14px; }
  .auth-label { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 6px; }
  .auth-input {
    width: 100%; padding: 12px 14px; background: var(--bg-input); border: 1.5px solid var(--border);
    border-radius: 10px; color: var(--text-primary); font-family: var(--font); font-size: 14px;
    transition: border-color .2s;
  }
  .auth-input:focus { outline: none; border-color: var(--accent); }
  .auth-input::placeholder { color: var(--text-muted); }

  .auth-btn {
    width: 100%; padding: 13px; background: var(--accent); border: none; border-radius: 10px;
    color: #fff; font-family: var(--font); font-size: 14px; font-weight: 700; cursor: pointer;
    transition: background .2s, transform .1s; margin-top: 8px;
  }
  .auth-btn:hover { background: var(--accent-light); }
  .auth-btn:active { transform: scale(.98); }
  .auth-btn:disabled { opacity: .5; cursor: not-allowed; }

  .auth-error {
    background: rgba(220,53,69,.12); border: 1px solid rgba(220,53,69,.3);
    color: #ff6b7a; font-size: 12px; padding: 10px 12px; border-radius: 8px;
    margin-top: 10px; display: none;
  }
  .auth-error.show { display: block; }

  /* ─── APP LAYOUT ─── */
  #app { display: flex; height: 100vh; display: none; }

  /* ─── SIDEBAR ─── */
  #sidebar {
    width: var(--sidebar-w); min-width: var(--sidebar-w);
    background: var(--bg-sidebar); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
  }

  .sidebar-header {
    padding: 16px 20px 12px; background: var(--bg-sidebar);
    border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px;
  }
  .my-avatar {
    width: 40px; height: 40px; border-radius: 50%; background: var(--accent);
    display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; color: #fff;
    cursor: pointer; flex-shrink: 0;
  }
  .sidebar-title { flex: 1; font-weight: 700; font-size: 18px; color: var(--text-primary); }
  .icon-btn {
    width: 36px; height: 36px; border-radius: 50%; border: none; background: transparent;
    color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background .2s;
  }
  .icon-btn:hover { background: var(--border); }

  .search-box {
    padding: 10px 14px;
    background: var(--bg-sidebar);
    border-bottom: 1px solid var(--border);
  }
  .search-input-wrap {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg-input); border-radius: 10px; padding: 8px 12px;
  }
  .search-input-wrap svg { color: var(--text-muted); flex-shrink: 0; }
  .search-input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text-primary); font-family: var(--font); font-size: 14px;
  }
  .search-input::placeholder { color: var(--text-muted); }

  .chat-list { flex: 1; overflow-y: auto; }
  .chat-list::-webkit-scrollbar { width: 4px; }
  .chat-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .section-label {
    padding: 10px 20px 6px; font-size: 11px; font-weight: 700;
    color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;
  }

  .chat-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 20px; cursor: pointer; transition: background .15s; position: relative;
  }
  .chat-item:hover { background: var(--bg-card); }
  .chat-item.active { background: var(--bg-message-in); }

  .chat-avatar {
    width: 48px; height: 48px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px; color: #fff;
    position: relative;
  }
  .online-dot {
    position: absolute; bottom: 1px; right: 1px; width: 12px; height: 12px;
    border-radius: 50%; background: var(--accent); border: 2px solid var(--bg-sidebar);
  }

  .chat-info { flex: 1; min-width: 0; }
  .chat-name { font-weight: 600; font-size: 15px; color: var(--text-primary); }
  .chat-preview {
    font-size: 13px; color: var(--text-secondary); white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; margin-top: 2px;
  }
  .chat-meta { text-align: right; flex-shrink: 0; }
  .chat-time { font-size: 11px; color: var(--text-muted); }
  .unread-badge {
    margin-top: 4px; background: var(--accent); color: #fff; font-size: 11px; font-weight: 700;
    padding: 2px 7px; border-radius: 20px; display: inline-block; min-width: 20px; text-align: center;
  }

  .empty-state {
    padding: 40px 20px; text-align: center; color: var(--text-muted); font-size: 13px;
  }
  .empty-state svg { margin-bottom: 12px; opacity: .4; }

  /* ─── FIND USER MODAL ─── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200;
    display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px);
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: var(--bg-sidebar); border: 1px solid var(--border); border-radius: 20px;
    padding: 28px; width: 340px; box-shadow: 0 24px 60px rgba(0,0,0,.6); animation: slideUp .3s ease;
  }
  .modal-title { font-weight: 700; font-size: 17px; margin-bottom: 16px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
  .btn-cancel {
    flex: 1; padding: 10px; background: var(--bg-input); border: none; border-radius: 10px;
    color: var(--text-secondary); font-family: var(--font); font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .user-result {
    padding: 12px 14px; background: var(--bg-input); border-radius: 10px; margin-top: 12px;
    display: flex; align-items: center; gap: 10px; cursor: pointer; transition: background .2s;
  }
  .user-result:hover { background: var(--bg-message-in); }

  /* ─── MAIN CHAT ─── */
  #chatMain {
    flex: 1; display: flex; flex-direction: column; height: 100vh;
    background: var(--bg-chat); overflow: hidden;
  }

  /* ─── WELCOME SCREEN ─── */
  #welcomeScreen {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: var(--text-secondary); gap: 16px;
  }
  #welcomeScreen .big-icon { width: 80px; height: 80px; opacity: .15; }
  #welcomeScreen h2 { font-size: 20px; font-weight: 700; color: var(--text-muted); }
  #welcomeScreen p { font-size: 13px; }

  /* ─── CHAT HEADER ─── */
  #chatHeader {
    display: none; padding: 12px 20px; background: var(--bg-sidebar);
    border-bottom: 1px solid var(--border); align-items: center; gap: 12px;
    flex-shrink: 0;
  }
  .header-avatar {
    width: 42px; height: 42px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 17px; color: #fff;
    position: relative; flex-shrink: 0;
  }
  .header-info { flex: 1; }
  .header-name { font-weight: 700; font-size: 15px; }
  .header-status { font-size: 12px; color: var(--accent); }

  /* ─── MESSAGES AREA ─── */
  #messagesArea {
    flex: 1; overflow-y: auto; padding: 16px 20px;
    display: none; flex-direction: column; gap: 2px;
    background: radial-gradient(ellipse at 70% 80%, rgba(0,168,132,.04) 0%, transparent 60%), var(--bg-chat);
  }
  #messagesArea::-webkit-scrollbar { width: 4px; }
  #messagesArea::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .date-separator {
    text-align: center; margin: 12px 0;
    font-size: 11px; font-weight: 600; color: var(--text-muted);
  }
  .date-separator span {
    background: var(--bg-message-in); padding: 4px 12px; border-radius: 20px;
  }

  .msg-wrap { display: flex; margin-bottom: 2px; }
  .msg-wrap.out { justify-content: flex-end; }
  .msg-wrap.in { justify-content: flex-start; }

  .msg-bubble {
    max-width: 65%; padding: 8px 12px 6px; border-radius: 12px;
    font-size: 14px; line-height: 1.5; position: relative;
    box-shadow: var(--bubble-shadow); word-break: break-word;
  }
  .msg-wrap.out .msg-bubble {
    background: var(--bg-message-out); border-bottom-right-radius: 4px;
    color: #e9edef;
  }
  .msg-wrap.in .msg-bubble {
    background: var(--bg-message-in); border-bottom-left-radius: 4px;
    color: var(--text-primary);
  }
  .msg-meta {
    display: flex; align-items: center; gap: 4px; justify-content: flex-end;
    margin-top: 4px; font-size: 11px; color: rgba(255,255,255,.45);
  }
  .msg-wrap.in .msg-meta { color: var(--text-muted); }
  .check-icon { width: 14px; height: 14px; }
  .check-icon.read { color: #53bdeb; }

  .typing-indicator {
    display: none; align-items: center; gap: 4px; padding: 10px 14px;
    background: var(--bg-message-in); border-radius: 12px; border-bottom-left-radius: 4px;
    width: fit-content; box-shadow: var(--bubble-shadow);
  }
  .typing-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted);
    animation: typingBounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: .2s; }
  .typing-dot:nth-child(3) { animation-delay: .4s; }
  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* ─── INPUT AREA ─── */
  #inputArea {
    display: none; padding: 12px 16px; background: var(--bg-sidebar);
    border-top: 1px solid var(--border); align-items: flex-end; gap: 10px; flex-shrink: 0;
  }
  .msg-input-wrap {
    flex: 1; background: var(--bg-input); border-radius: 28px;
    display: flex; align-items: flex-end; gap: 8px; padding: 10px 16px;
    border: 1.5px solid transparent; transition: border-color .2s;
  }
  .msg-input-wrap:focus-within { border-color: var(--accent); }
  .msg-input {
    flex: 1; background: none; border: none; outline: none; resize: none;
    color: var(--text-primary); font-family: var(--font); font-size: 14.5px;
    line-height: 1.5; max-height: 120px; overflow-y: auto;
  }
  .msg-input::placeholder { color: var(--text-muted); }

  .send-btn {
    width: 46px; height: 46px; border-radius: 50%; border: none; background: var(--accent);
    color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background .2s, transform .1s; flex-shrink: 0;
  }
  .send-btn:hover { background: var(--accent-light); }
  .send-btn:active { transform: scale(.93); }
  .send-btn:disabled { opacity: .4; cursor: default; transform: none; }

  /* ─── PROFILE DROPDOWN ─── */
  .dropdown {
    position: absolute; top: 60px; left: 16px; z-index: 50;
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px;
    box-shadow: 0 12px 40px rgba(0,0,0,.5); min-width: 200px; overflow: hidden;
    animation: fadeIn .15s ease; display: none;
  }
  .dropdown.show { display: block; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(-6px) } to { opacity:1; transform:none } }
  .dropdown-item {
    padding: 12px 16px; font-size: 13px; font-weight: 500; cursor: pointer;
    display: flex; align-items: center; gap: 10px; color: var(--text-primary);
    transition: background .15s;
  }
  .dropdown-item:hover { background: var(--bg-message-in); }
  .dropdown-item.danger { color: #ff6b7a; }
  .dropdown-divider { height: 1px; background: var(--border); }
  .user-chip {
    padding: 12px 16px; font-size: 13px; color: var(--text-secondary);
    border-bottom: 1px solid var(--border);
  }
  .user-chip strong { color: var(--accent-light); display: block; font-size: 15px; }

  /* ─── TOAST ─── */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--bg-card); border: 1px solid var(--border); color: var(--text-primary);
    padding: 10px 20px; border-radius: 24px; font-size: 13px; font-weight: 500;
    z-index: 999; box-shadow: 0 8px 24px rgba(0,0,0,.4);
    opacity: 0; transition: opacity .3s; pointer-events: none;
  }
  .toast.show { opacity: 1; }

  /* ─── LOADING SPINNER ─── */
  .spinner {
    width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3);
    border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 700px) {
    :root { --sidebar-w: 100vw; }
    #sidebar { position: absolute; z-index: 10; left: 0; top: 0; bottom: 0; transition: transform .3s; }
    #sidebar.hidden { transform: translateX(-100%); }
    #chatMain { width: 100vw; }
    #chatHeader { display: flex !important; }
    .back-btn { display: flex !important; }
  }
  .back-btn {
    display: none; width: 36px; height: 36px; border-radius: 50%; border: none;
    background: transparent; color: var(--text-secondary); cursor: pointer;
    align-items: center; justify-content: center; transition: background .2s;
  }
  .back-btn:hover { background: var(--border); }

  /* Avatar colors */
  .av-0 { background: #e53e3e; }
  .av-1 { background: #dd6b20; }
  .av-2 { background: #d69e2e; }
  .av-3 { background: #38a169; }
  .av-4 { background: #319795; }
  .av-5 { background: #3182ce; }
  .av-6 { background: #805ad5; }
  .av-7 { background: #d53f8c; }
  .av-8 { background: #2b6cb0; }
  .av-9 { background: #276749; }
</style>
</head>
<body>

<!-- ─── AUTH SCREEN ─── -->
<div id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">
      <svg viewBox="0 0 38 38" fill="none">
        <circle cx="19" cy="19" r="19" fill="#00a884"/>
        <path d="M19 8C13 8 8 13 8 19c0 2 .5 3.9 1.4 5.5L8 30l5.7-1.4A11 11 0 1 0 19 8z" fill="#fff"/>
        <circle cx="14" cy="19" r="1.5" fill="#00a884"/>
        <circle cx="19" cy="19" r="1.5" fill="#00a884"/>
        <circle cx="24" cy="19" r="1.5" fill="#00a884"/>
      </svg>
      <span>ChatApp</span>
    </div>
    <div class="auth-tabs">
      <div class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Masuk</div>
      <div class="auth-tab" id="tabRegister" onclick="switchTab('register')">Daftar</div>
    </div>
    <div id="loginForm">
      <div class="auth-group">
        <div class="auth-label">Username</div>
        <input class="auth-input" id="loginUsername" type="text" placeholder="Masukkan username" autocomplete="username" />
      </div>
      <div class="auth-group">
        <div class="auth-label">Password</div>
        <input class="auth-input" id="loginPassword" type="password" placeholder="Masukkan password" autocomplete="current-password" />
      </div>
      <button class="auth-btn" id="loginBtn" onclick="doLogin()">Masuk</button>
      <div class="auth-error" id="loginError"></div>
    </div>
    <div id="registerForm" style="display:none">
      <div class="auth-group">
        <div class="auth-label">Username</div>
        <input class="auth-input" id="regUsername" type="text" placeholder="Pilih username unik" autocomplete="username" />
      </div>
      <div class="auth-group">
        <div class="auth-label">Password</div>
        <input class="auth-input" id="regPassword" type="password" placeholder="Min. 6 karakter" autocomplete="new-password" />
      </div>
      <div class="auth-group">
        <div class="auth-label">Konfirmasi Password</div>
        <input class="auth-input" id="regPassword2" type="password" placeholder="Ulangi password" autocomplete="new-password" />
      </div>
      <button class="auth-btn" id="registerBtn" onclick="doRegister()">Buat Akun</button>
      <div class="auth-error" id="registerError"></div>
    </div>
  </div>
</div>

<!-- ─── MAIN APP ─── -->
<div id="app">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-header">
      <div class="my-avatar av-3" id="myAvatar" onclick="toggleDropdown()">A</div>
      <span class="sidebar-title">ChatApp</span>
      <button class="icon-btn" onclick="openFindUser()" title="Cari pengguna">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </button>
    </div>

    <!-- Profile Dropdown -->
    <div class="dropdown" id="profileDropdown">
      <div class="user-chip">Masuk sebagai<strong id="myUsernameDisplay">—</strong></div>
      <div class="dropdown-item" onclick="openFindUser()">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        Cari Pengguna
      </div>
      <div class="dropdown-divider"></div>
      <div class="dropdown-item danger" onclick="doLogout()">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Keluar
      </div>
    </div>

    <div class="search-box">
      <div class="search-input-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input class="search-input" id="chatSearch" placeholder="Cari chat..." oninput="filterChats()" />
      </div>
    </div>

    <div class="chat-list" id="chatList">
      <div class="empty-state">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="big-icon"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <p>Tekan 🔍 untuk mencari pengguna<br>dan mulai percakapan!</p>
      </div>
    </div>
  </div>

  <!-- MAIN CHAT AREA -->
  <div id="chatMain">
    <!-- Welcome -->
    <div id="welcomeScreen">
      <svg class="big-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <h2>ChatApp</h2>
      <p>Pilih chat atau cari pengguna untuk mulai ngobrol</p>
    </div>

    <!-- Chat Header -->
    <div id="chatHeader">
      <button class="back-btn" id="backBtn" onclick="closeMobileChat()">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="header-avatar av-5" id="chatHeaderAvatar">?</div>
      <div class="header-info">
        <div class="header-name" id="chatHeaderName">—</div>
        <div class="header-status" id="chatHeaderStatus">offline</div>
      </div>
    </div>

    <!-- Messages -->
    <div id="messagesArea">
      <div class="typing-indicator" id="typingIndicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>

    <!-- Input -->
    <div id="inputArea">
      <div class="msg-input-wrap">
        <textarea class="msg-input" id="msgInput" rows="1" placeholder="Ketik pesan..." oninput="autoResize(this); handleTyping()" onkeydown="handleKey(event)"></textarea>
      </div>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- ─── FIND USER MODAL ─── -->
<div class="modal-overlay" id="findUserModal">
  <div class="modal-box">
    <div class="modal-title">Cari Pengguna</div>
    <div class="auth-group">
      <div class="auth-label">Username</div>
      <input class="auth-input" id="findUserInput" type="text" placeholder="Masukkan username..." onkeydown="if(event.key==='Enter')searchUser()" />
    </div>
    <div id="findUserResult"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeFindUser()">Batal</button>
      <button class="auth-btn" style="flex:1" onclick="searchUser()">Cari</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════
//  INIT FIREBASE
// ═══════════════════════════════════════
firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const db   = firebase.firestore();

// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
let currentUser   = null;   // Firebase user
let myUsername    = '';
let activeChatId  = null;
let activePeer    = null;   // { uid, username }
let msgUnsubscribe  = null;
let chatUnsubscribe = null;
let typingTimeout   = null;

const avatarColors = ['av-0','av-1','av-2','av-3','av-4','av-5','av-6','av-7','av-8','av-9'];
const getAvatarClass = (str) => avatarColors[str.charCodeAt(0) % 10];

// ═══════════════════════════════════════
//  AUTH HELPERS
// ═══════════════════════════════════════
function switchTab(tab) {
  document.getElementById('tabLogin').classList.toggle('active', tab==='login');
  document.getElementById('tabRegister').classList.toggle('active', tab==='register');
  document.getElementById('loginForm').style.display   = tab==='login' ? '' : 'none';
  document.getElementById('registerForm').style.display = tab==='register' ? '' : 'none';
}

function toEmail(username) { return username.toLowerCase() + '@chatapp.internal'; }

async function doRegister() {
  const username = document.getElementById('regUsername').value.trim();
  const pw1      = document.getElementById('regPassword').value;
  const pw2      = document.getElementById('regPassword2').value;
  const errEl    = document.getElementById('registerError');
  const btn      = document.getElementById('registerBtn');

  errEl.classList.remove('show');

  if (!username || username.length < 3)  return showErr(errEl, 'Username minimal 3 karakter');
  if (!/^[a-zA-Z0-9_]+$/.test(username)) return showErr(errEl, 'Username hanya boleh huruf, angka, dan underscore');
  if (pw1.length < 6)  return showErr(errEl, 'Password minimal 6 karakter');
  if (pw1 !== pw2)     return showErr(errEl, 'Konfirmasi password tidak cocok');

  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';

  try {
    // Check username uniqueness
    const snap = await db.collection('usernames').doc(username.toLowerCase()).get();
    if (snap.exists) throw new Error('Username sudah dipakai');

    const cred = await auth.createUserWithEmailAndPassword(toEmail(username), pw1);
    const uid  = cred.user.uid;

    // Save username mapping & user profile
    await db.collection('usernames').doc(username.toLowerCase()).set({ uid });
    await db.collection('users').doc(uid).set({
      uid, username, usernameLower: username.toLowerCase(),
      online: true, lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch(e) {
    showErr(errEl, e.message);
    btn.disabled = false; btn.textContent = 'Buat Akun';
  }
}

async function doLogin() {
  const username = document.getElementById('loginUsername').value.trim();
  const pw       = document.getElementById('loginPassword').value;
  const errEl    = document.getElementById('loginError');
  const btn      = document.getElementById('loginBtn');

  errEl.classList.remove('show');
  if (!username) return showErr(errEl, 'Masukkan username');
  if (!pw)       return showErr(errEl, 'Masukkan password');

  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
  try {
    await auth.signInWithEmailAndPassword(toEmail(username), pw);
  } catch(e) {
    let msg = e.message;
    if (e.code === 'auth/user-not-found' || e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential')
      msg = 'Username atau password salah';
    showErr(errEl, msg);
    btn.disabled = false; btn.textContent = 'Masuk';
  }
}

function doLogout() {
  if (currentUser) {
    db.collection('users').doc(currentUser.uid).update({ online: false, lastSeen: firebase.firestore.FieldValue.serverTimestamp() });
  }
  auth.signOut();
  toggleDropdown(false);
}

function showErr(el, msg) { el.textContent = msg; el.classList.add('show'); }

// ═══════════════════════════════════════
//  AUTH STATE
// ═══════════════════════════════════════
auth.onAuthStateChanged(async user => {
  if (user) {
    currentUser = user;
    const snap = await db.collection('users').doc(user.uid).get();
    if (!snap.exists) { auth.signOut(); return; }
    const data = snap.data();
    myUsername = data.username;

    // Mark online
    await db.collection('users').doc(user.uid).update({ online: true, lastSeen: firebase.firestore.FieldValue.serverTimestamp() });

    // Update online on close
    window.addEventListener('beforeunload', () => {
      db.collection('users').doc(user.uid).update({ online: false, lastSeen: firebase.firestore.FieldValue.serverTimestamp() });
    });

    // Update UI
    const initials = myUsername.charAt(0).toUpperCase();
    const avClass  = getAvatarClass(myUsername);
    const myAv     = document.getElementById('myAvatar');
    myAv.textContent = initials;
    myAv.className   = 'my-avatar ' + avClass;
    document.getElementById('myUsernameDisplay').textContent = '@' + myUsername;

    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';

    loadChats();
  } else {
    currentUser = null; myUsername = '';
    document.getElementById('authScreen').style.display = '';
    document.getElementById('app').style.display = 'none';
    if (msgUnsubscribe)  { msgUnsubscribe(); msgUnsubscribe = null; }
    if (chatUnsubscribe) { chatUnsubscribe(); chatUnsubscribe = null; }
    // Reset auth buttons
    document.getElementById('loginBtn').disabled = false;
    document.getElementById('loginBtn').textContent = 'Masuk';
    document.getElementById('registerBtn').disabled = false;
    document.getElementById('registerBtn').textContent = 'Buat Akun';
    document.getElementById('loginError').classList.remove('show');
    document.getElementById('registerError').classList.remove('show');
  }
});

// ═══════════════════════════════════════
//  CHAT LIST
// ═══════════════════════════════════════
let allChats = [];

function loadChats() {
  if (chatUnsubscribe) chatUnsubscribe();
  chatUnsubscribe = db.collection('chats')
    .where('participants', 'array-contains', currentUser.uid)
    .orderBy('updatedAt', 'desc')
    .onSnapshot(async snap => {
      allChats = [];
      const promises = snap.docs.map(async doc => {
        const data = doc.data();
        const peerId = data.participants.find(p => p !== currentUser.uid);
        const peerSnap = await db.collection('users').doc(peerId).get();
        if (!peerSnap.exists) return;
        const peer = peerSnap.data();
        allChats.push({ id: doc.id, peer, lastMsg: data.lastMessage || '', updatedAt: data.updatedAt, unread: data['unread_' + currentUser.uid] || 0 });
      });
      await Promise.all(promises);
      allChats.sort((a,b) => (b.updatedAt?.seconds||0) - (a.updatedAt?.seconds||0));
      renderChatList(allChats);
    });
}

function renderChatList(chats) {
  const el = document.getElementById('chatList');
  if (chats.length === 0) {
    el.innerHTML = `<div class="empty-state"><svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><p>Tekan 🔍 untuk mencari pengguna<br>dan mulai percakapan!</p></div>`;
    return;
  }
  el.innerHTML = chats.map(c => {
    const initials = c.peer.username.charAt(0).toUpperCase();
    const avClass  = getAvatarClass(c.peer.username);
    const time     = c.updatedAt ? formatTime(c.updatedAt.toDate()) : '';
    const active   = activeChatId === c.id ? ' active' : '';
    return `
      <div class="chat-item${active}" onclick="openChat('${c.id}','${c.peer.uid}','${escapeHtml(c.peer.username)}')">
        <div class="chat-avatar ${avClass}">${initials}${c.peer.online ? '<div class="online-dot"></div>' : ''}</div>
        <div class="chat-info">
          <div class="chat-name">@${escapeHtml(c.peer.username)}</div>
          <div class="chat-preview">${escapeHtml(c.lastMsg)}</div>
        </div>
        <div class="chat-meta">
          <div class="chat-time">${time}</div>
          ${c.unread > 0 ? `<div class="unread-badge">${c.unread}</div>` : ''}
        </div>
      </div>`;
  }).join('');
}

function filterChats() {
  const q = document.getElementById('chatSearch').value.toLowerCase();
  renderChatList(allChats.filter(c => c.peer.username.toLowerCase().includes(q)));
}

// ═══════════════════════════════════════
//  OPEN CHAT
// ═══════════════════════════════════════
function getChatId(uid1, uid2) { return [uid1, uid2].sort().join('_'); }

async function openChat(chatId, peerUid, peerUsername) {
  if (activeChatId === chatId) return;
  activeChatId = chatId;
  activePeer   = { uid: peerUid, username: peerUsername };

  // Mobile: hide sidebar
  if (window.innerWidth <= 700) document.getElementById('sidebar').classList.add('hidden');

  // Reset unread
  db.collection('chats').doc(chatId).update({ ['unread_' + currentUser.uid]: 0 }).catch(()=>{});

  // Header
  const initials = peerUsername.charAt(0).toUpperCase();
  const avEl     = document.getElementById('chatHeaderAvatar');
  avEl.textContent = initials;
  avEl.className   = 'header-avatar ' + getAvatarClass(peerUsername);
  document.getElementById('chatHeaderName').textContent = '@' + peerUsername;

  document.getElementById('chatHeader').style.display  = 'flex';
  document.getElementById('messagesArea').style.display = 'flex';
  document.getElementById('inputArea').style.display    = 'flex';
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('msgInput').focus();

  // Highlight active chat
  document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));

  // Peer online status
  watchPeerStatus(peerUid);

  // Listen messages
  if (msgUnsubscribe) msgUnsubscribe();
  const msgArea = document.getElementById('messagesArea');
  msgUnsubscribe = db.collection('chats').doc(chatId).collection('messages')
    .orderBy('createdAt')
    .onSnapshot(snap => {
      renderMessages(snap.docs.map(d => ({ id: d.id, ...d.data() })));
    });
}

let peerStatusUnsub = null;
function watchPeerStatus(peerUid) {
  if (peerStatusUnsub) peerStatusUnsub();
  peerStatusUnsub = db.collection('users').doc(peerUid).onSnapshot(snap => {
    if (!snap.exists) return;
    const d = snap.data();
    const statusEl = document.getElementById('chatHeaderStatus');
    if (d.online) {
      statusEl.textContent = 'online';
      statusEl.style.color = 'var(--accent)';
    } else {
      const ls = d.lastSeen ? formatTime(d.lastSeen.toDate()) : '';
      statusEl.textContent = ls ? `terakhir lihat ${ls}` : 'offline';
      statusEl.style.color = 'var(--text-muted)';
    }
  });
}

// ═══════════════════════════════════════
//  MESSAGES RENDER
// ═══════════════════════════════════════
let lastDateLabel = '';

function renderMessages(msgs) {
  const area = document.getElementById('messagesArea');
  const typing = document.getElementById('typingIndicator');
  const wasBottom = area.scrollHeight - area.scrollTop - area.clientHeight < 60;

  area.innerHTML = '';
  area.appendChild(typing);

  lastDateLabel = '';
  msgs.forEach(msg => {
    const isOut = msg.senderId === currentUser.uid;
    const date  = msg.createdAt ? msg.createdAt.toDate() : new Date();
    const dateStr = formatDate(date);

    if (dateStr !== lastDateLabel) {
      const sep = document.createElement('div');
      sep.className = 'date-separator';
      sep.innerHTML = `<span>${dateStr}</span>`;
      area.insertBefore(sep, typing);
      lastDateLabel = dateStr;
    }

    const wrap = document.createElement('div');
    wrap.className = 'msg-wrap ' + (isOut ? 'out' : 'in');
    wrap.innerHTML = `
      <div class="msg-bubble">
        ${escapeHtml(msg.text)}
        <div class="msg-meta">
          <span>${formatHHMM(date)}</span>
          ${isOut ? `<svg class="check-icon ${msg.read ? 'read' : ''}" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>` : ''}
        </div>
      </div>`;
    area.insertBefore(wrap, typing);
  });

  // Mark messages as read
  if (activeChatId && msgs.length) {
    msgs.filter(m => m.senderId !== currentUser.uid && !m.read).forEach(m => {
      db.collection('chats').doc(activeChatId).collection('messages').doc(m.id).update({ read: true }).catch(()=>{});
    });
  }

  if (wasBottom || msgs.length <= 1) area.scrollTop = area.scrollHeight;
}

// ═══════════════════════════════════════
//  SEND MESSAGE
// ═══════════════════════════════════════
async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text  = input.value.trim();
  if (!text || !activePeer) return;

  const chatId = getChatId(currentUser.uid, activePeer.uid);
  input.value = ''; autoResize(input);
  document.getElementById('sendBtn').disabled = true;

  // Ensure chat doc exists
  const chatRef = db.collection('chats').doc(chatId);
  const chatSnap = await chatRef.get();
  if (!chatSnap.exists) {
    await chatRef.set({
      participants: [currentUser.uid, activePeer.uid],
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      lastMessage: '',
      ['unread_' + activePeer.uid]: 0,
      ['unread_' + currentUser.uid]: 0
    });
  }

  // Add message
  await chatRef.collection('messages').add({
    text, senderId: currentUser.uid, senderUsername: myUsername,
    createdAt: firebase.firestore.FieldValue.serverTimestamp(), read: false
  });

  // Update chat doc
  const unreadField = 'unread_' + activePeer.uid;
  await chatRef.update({
    lastMessage: text,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    [unreadField]: firebase.firestore.FieldValue.increment(1)
  });

  // Open in sidebar if new chat
  if (!activeChatId) activeChatId = chatId;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  document.getElementById('sendBtn').disabled = !el.value.trim();
}

// ═══════════════════════════════════════
//  TYPING INDICATOR (simple)
// ═══════════════════════════════════════
function handleTyping() {
  // Can be extended with Firestore typing state
}

// ═══════════════════════════════════════
//  FIND USER
// ═══════════════════════════════════════
function openFindUser() {
  document.getElementById('findUserModal').classList.add('show');
  document.getElementById('findUserInput').value = '';
  document.getElementById('findUserResult').innerHTML = '';
  toggleDropdown(false);
  setTimeout(() => document.getElementById('findUserInput').focus(), 100);
}
function closeFindUser() { document.getElementById('findUserModal').classList.remove('show'); }

async function searchUser() {
  const q   = document.getElementById('findUserInput').value.trim().toLowerCase();
  const res = document.getElementById('findUserResult');
  if (!q) return;
  res.innerHTML = '<div style="color:var(--text-muted);font-size:13px;margin-top:8px">Mencari...</div>';

  const snap = await db.collection('users').where('usernameLower','==', q).limit(1).get();
  if (snap.empty) { res.innerHTML = '<div style="color:var(--text-muted);font-size:13px;margin-top:8px">Pengguna tidak ditemukan</div>'; return; }

  const peer = snap.docs[0].data();
  if (peer.uid === currentUser.uid) { res.innerHTML = '<div style="color:var(--text-muted);font-size:13px;margin-top:8px">Itu akun kamu sendiri 😄</div>'; return; }

  const avClass = getAvatarClass(peer.username);
  res.innerHTML = `
    <div class="user-result" onclick="startChatWith('${peer.uid}','${escapeHtml(peer.username)}')">
      <div class="chat-avatar ${avClass}" style="width:40px;height:40px;font-size:15px">${peer.username.charAt(0).toUpperCase()}</div>
      <div>
        <div style="font-weight:600;font-size:14px">@${escapeHtml(peer.username)}</div>
        <div style="font-size:12px;color:var(--${peer.online?'accent':'text-muted'})">${peer.online?'● Online':'● Offline'}</div>
      </div>
    </div>`;
}

async function startChatWith(peerUid, peerUsername) {
  closeFindUser();
  const chatId = getChatId(currentUser.uid, peerUid);
  // Add to sidebar immediately
  activeChatId = null; // force refresh
  await openChat(chatId, peerUid, peerUsername);
  activeChatId = chatId;
}

// ═══════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════
function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatHHMM(date) {
  return date.toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' });
}

function formatDate(date) {
  const now  = new Date();
  const diff = Math.floor((now - date) / 86400000);
  if (diff === 0) return 'Hari ini';
  if (diff === 1) return 'Kemarin';
  return date.toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' });
}

function formatTime(date) {
  const now  = new Date();
  const diff = Math.floor((now - date) / 86400000);
  if (diff === 0) return formatHHMM(date);
  if (diff === 1) return 'Kemarin';
  return date.toLocaleDateString('id-ID', { day:'numeric', month:'short' });
}

function toggleDropdown(force) {
  const dd = document.getElementById('profileDropdown');
  if (force === false) { dd.classList.remove('show'); return; }
  dd.classList.toggle('show');
}
document.addEventListener('click', e => {
  if (!document.getElementById('myAvatar').contains(e.target) && !document.getElementById('profileDropdown').contains(e.target))
    toggleDropdown(false);
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function closeMobileChat() {
  document.getElementById('sidebar').classList.remove('hidden');
  document.getElementById('chatHeader').style.display = 'none';
  document.getElementById('messagesArea').style.display = 'none';
  document.getElementById('inputArea').style.display   = 'none';
  document.getElementById('welcomeScreen').style.display = '';
  activeChatId = null; activePeer = null;
  if (msgUnsubscribe) { msgUnsubscribe(); msgUnsubscribe = null; }
  if (peerStatusUnsub) { peerStatusUnsub(); peerStatusUnsub = null; }
}

// Enter on auth inputs
document.getElementById('loginPassword').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
document.getElementById('regPassword2').addEventListener('keydown', e => { if(e.key==='Enter') doRegister(); });
</script>
