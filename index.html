<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0e14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="AZRA-CHAT - Realtime messaging app">
  <meta property="og:title" content="AZRA-CHAT">
  <meta property="og:description" content="Realtime chat app with Firebase">
  <meta property="og:type" content="website">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">
  <title>AZRA-CHAT</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --bg-primary: #0a0e14;
      --bg-secondary: #12161e;
      --bg-tertiary: #1a1f2b;
      --bg-card: #181d27;
      --bg-hover: #1f2633;
      --bg-input: #141a23;
      --accent: #00c853;
      --accent-dark: #009624;
      --accent-glow: rgba(0, 200, 83, 0.3);
      --text-primary: #e8edf2;
      --text-secondary: #8b95a5;
      --text-muted: #5a6475;
      --border: #1e2530;
      --danger: #ef4444;
      --danger-hover: rgba(239, 68, 68, 0.15);
      --bubble-sent: #004d3a;
      --bubble-received: #1a2232;
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --radius-xl: 28px;
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.4);
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }

    /* ===== SCREENS ===== */
    .screen {
      display: none;
      width: 100%;
      height: 100vh;
      position: absolute;
      top: 0;
      left: 0;
    }
    .screen.active { display: flex; }
    .screen.fade-out { animation: fadeOut 0.2s ease forwards; }
    .screen.fade-in { animation: fadeIn 0.3s ease forwards; }
    @keyframes fadeOut { to { opacity: 0; transform: scale(0.98); } }
    @keyframes fadeIn { from { opacity: 0; transform: scale(1.02); } to { opacity: 1; transform: scale(1); } }

    /* ===== LOGIN SCREEN ===== */
    #login-screen {
      background: linear-gradient(160deg, #0a0e14 0%, #0d1117 40%, #111820 100%);
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 16px;
    }
    .login-wrapper {
      background: var(--bg-card);
      padding: 44px 36px;
      border-radius: var(--radius-lg);
      text-align: center;
      width: 92%;
      max-width: 400px;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    .login-wrapper::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 20%, var(--accent-glow) 0%, transparent 60%);
      opacity: 0.15;
      pointer-events: none;
    }
    .login-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--accent), #00e066);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 32px;
      color: #000;
      box-shadow: 0 8px 24px var(--accent-glow);
      position: relative;
      z-index: 1;
    }
    .login-icon i { animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    .login-title {
      font-size: 26px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.5px;
      position: relative;
      z-index: 1;
    }
    .login-title span { color: var(--accent); }
    .login-desc {
      color: var(--text-secondary);
      font-size: 13px;
      margin: 8px 0 28px;
      position: relative;
      z-index: 1;
      line-height: 1.5;
    }
    .input-group {
      position: relative;
      z-index: 1;
      margin-bottom: 8px;
    }
    .input-group input {
      width: 100%;
      padding: 15px 18px;
      background: var(--bg-input);
      border: 2px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 15px;
      outline: none;
      transition: var(--transition);
      letter-spacing: 0.3px;
    }
    .input-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(0, 200, 83, 0.1);
    }
    .input-group input::placeholder { color: var(--text-muted); }
    .input-group .input-icon {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 16px;
    }
    .btn-login {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--accent), #00e066);
      border: none;
      border-radius: var(--radius-md);
      color: #000;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      position: relative;
      z-index: 1;
      letter-spacing: 0.5px;
      margin-top: 8px;
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 24px var(--accent-glow); }
    .btn-login:active { transform: scale(0.97); }
    .btn-login:disabled { background: #333; cursor: not-allowed; transform: none; box-shadow: none; color: #777; }
    .error-text {
      color: var(--danger);
      font-size: 12px;
      min-height: 18px;
      margin-top: 6px;
      position: relative;
      z-index: 1;
    }

    /* ===== CHAT SCREEN ===== */
    #chat-screen {
      background: var(--bg-primary);
      flex-direction: row;
      max-width: 1440px;
      margin: 0 auto;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 0 80px rgba(0,0,0,0.5);
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 380px;
      min-width: 380px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
      transition: var(--transition);
    }
    .sidebar-header {
      padding: 20px;
      background: var(--bg-tertiary);
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #00e066);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 19px;
      color: #000;
      flex-shrink: 0;
      transition: var(--transition);
    }
    .sidebar-userinfo { flex: 1; min-width: 0; }
    .sidebar-username {
      color: var(--text-primary);
      font-weight: 600;
      font-size: 15px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sidebar-status {
      color: var(--accent);
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .sidebar-status::before {
      content: '';
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      display: inline-block;
      animation: pulse-dot 1.5s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .btn-icon {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 18px;
      cursor: pointer;
      padding: 10px;
      border-radius: var(--radius-sm);
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-icon:hover { color: var(--text-primary); background: var(--bg-hover); }
    .btn-icon.danger:hover { color: var(--danger); background: var(--danger-hover); }
    .search-wrapper {
      padding: 14px;
      border-bottom: 1px solid var(--border);
    }
    .search-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg-input);
      border-radius: var(--radius-xl);
      padding: 12px 18px;
      border: 1.5px solid transparent;
      transition: var(--transition);
    }
    .search-bar:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(0, 200, 83, 0.08);
    }
    .search-bar i { color: var(--text-muted); font-size: 15px; }
    .search-bar input {
      flex: 1;
      background: none;
      border: none;
      color: var(--text-primary);
      outline: none;
      font-size: 14px;
      letter-spacing: 0.2px;
    }
    .search-bar input::placeholder { color: var(--text-muted); }
    .user-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px;
      scroll-behavior: smooth;
    }
    .user-list::-webkit-scrollbar { width: 4px; }
    .user-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    .user-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: var(--transition);
      margin-bottom: 2px;
      position: relative;
    }
    .user-card:hover { background: var(--bg-hover); }
    .user-card.selected { background: rgba(0, 200, 83, 0.08); border-left: 3px solid var(--accent); }
    .user-card-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
      color: #fff;
      flex-shrink: 0;
      position: relative;
    }
    .online-indicator {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--accent);
      position: absolute;
      bottom: 1px;
      right: 1px;
      border: 3px solid var(--bg-secondary);
      box-shadow: 0 0 8px var(--accent-glow);
    }
    .user-card-info { flex: 1; min-width: 0; }
    .user-card-name {
      color: var(--text-primary);
      font-weight: 600;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .user-card-name .verified { color: var(--accent); font-size: 15px; }
    .user-card-preview {
      color: var(--text-muted);
      font-size: 12px;
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .user-card-meta {
      text-align: right;
      flex-shrink: 0;
    }
    .unread-badge {
      background: var(--accent);
      color: #000;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 9px;
      border-radius: 20px;
      min-width: 22px;
      text-align: center;
    }
    .user-card-time {
      color: var(--text-muted);
      font-size: 11px;
      margin-top: 6px;
    }
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }
    .empty-state i { font-size: 56px; display: block; margin-bottom: 16px; opacity: 0.4; }
    .empty-state p { font-size: 14px; line-height: 1.6; }

    /* ===== CHAT AREA ===== */
    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: var(--bg-primary);
    }
    .chat-topbar {
      padding: 16px 20px;
      background: var(--bg-tertiary);
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .btn-back {
      display: none;
      background: none;
      border: none;
      color: var(--accent);
      font-size: 22px;
      cursor: pointer;
      padding: 6px;
    }
    .chat-topbar-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }
    .chat-topbar-info { flex: 1; min-width: 0; }
    .chat-topbar-name { font-weight: 600; font-size: 15px; color: var(--text-primary); }
    .chat-topbar-status {
      font-size: 12px;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .chat-topbar-status.offline { color: var(--text-muted); }
    .chat-topbar-status::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      display: inline-block;
    }
    .chat-topbar-status.offline::before { background: var(--text-muted); }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scroll-behavior: smooth;
      background: radial-gradient(ellipse at center, #0d1117 0%, var(--bg-primary) 70%);
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    .welcome-chat {
      text-align: center;
      margin: auto;
      color: var(--text-muted);
      max-width: 300px;
    }
    .welcome-chat i { font-size: 72px; display: block; margin-bottom: 20px; opacity: 0.3; }
    .welcome-chat h3 { font-size: 18px; color: var(--text-secondary); margin-bottom: 8px; }
    .welcome-chat p { font-size: 13px; line-height: 1.6; }
    .date-divider {
      text-align: center;
      margin: 16px 0;
      position: relative;
    }
    .date-divider span {
      background: var(--bg-primary);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 11px;
      color: var(--text-muted);
      border: 1px solid var(--border);
      position: relative;
      z-index: 1;
    }
    .date-divider::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      width: 100%;
      height: 1px;
      background: var(--border);
    }
    .msg-bubble {
      max-width: 72%;
      padding: 12px 18px;
      border-radius: 18px;
      word-wrap: break-word;
      font-size: 14px;
      line-height: 1.6;
      position: relative;
      animation: msgIn 0.25s ease;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg-bubble.sent {
      background: var(--bubble-sent);
      align-self: flex-end;
      border-bottom-right-radius: 4px;
      color: #c8f0d8;
      margin-left: auto;
    }
    .msg-bubble.received {
      background: var(--bubble-received);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      color: var(--text-primary);
      border: 1px solid var(--border);
    }
    .msg-sender-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 5px;
      letter-spacing: 0.3px;
    }
    .msg-time-label {
      font-size: 10px;
      color: var(--text-muted);
      text-align: right;
      margin-top: 5px;
      letter-spacing: 0.2px;
    }
    .msg-bubble.sent .msg-time-label { color: rgba(200, 240, 216, 0.6); }
    .chat-input-bar {
      padding: 14px 20px;
      background: var(--bg-tertiary);
      display: flex;
      gap: 10px;
      align-items: center;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .chat-input-bar input {
      flex: 1;
      padding: 13px 20px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-xl);
      background: var(--bg-input);
      color: var(--text-primary);
      outline: none;
      font-size: 14px;
      transition: var(--transition);
      letter-spacing: 0.2px;
    }
    .chat-input-bar input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(0, 200, 83, 0.08);
    }
    .chat-input-bar input::placeholder { color: var(--text-muted); }
    .btn-send {
      background: var(--accent);
      color: #000;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: none;
      font-size: 18px;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 4px 12px var(--accent-glow);
    }
    .btn-send:hover { transform: scale(1.06); box-shadow: 0 6px 20px var(--accent-glow); }
    .btn-send:active { transform: scale(0.94); }
    .btn-attach {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 22px;
      cursor: pointer;
      padding: 8px;
      transition: var(--transition);
      border-radius: var(--radius-sm);
    }
    .btn-attach:hover { color: var(--accent); background: var(--bg-hover); }

    /* ===== TOAST ===== */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }
    .toast {
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 14px 20px;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      font-size: 13px;
      color: var(--text-primary);
      animation: slideIn 0.3s ease;
      pointer-events: auto;
      display: flex;
      align-items: center;
      gap: 10px;
      max-width: 380px;
    }
    .toast.success { border-left: 3px solid var(--accent); }
    .toast.error { border-left: 3px solid var(--danger); }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(100px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .sidebar {
        width: 100%;
        min-width: 100%;
        position: absolute;
        z-index: 20;
        height: 100vh;
      }
      .sidebar.hidden { transform: translateX(-100%); pointer-events: none; }
      .btn-back { display: block; }
      .chat-topbar { padding: 12px 16px; }
      .chat-messages { padding: 16px; }
      .chat-input-bar { padding: 12px 16px; }
      .msg-bubble { max-width: 85%; }
      .login-wrapper { width: 96%; padding: 32px 24px; }
    }
    @media (max-width: 380px) {
      .msg-bubble { max-width: 90%; font-size: 13px; }
      .chat-input-bar input { font-size: 13px; padding: 11px 16px; }
    }
  </style>
</head>
<body>

  <!-- ========== LOGIN SCREEN ========== -->
  <div id="login-screen" class="screen active">
    <div class="login-wrapper">
      <div class="login-icon"><i class="fas fa-comments"></i></div>
      <h1 class="login-title">AZRA<span>-CHAT</span></h1>
      <p class="login-desc">Realtime messaging. Cukup username, langsung ngobrol.</p>
      <div class="input-group">
        <input type="text" id="username-input" placeholder="Username kamu..." maxlength="18" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        <span class="input-icon"><i class="fas fa-at"></i></span>
      </div>
      <div class="error-text" id="login-error"></div>
      <button class="btn-login" id="login-btn" onclick="handleLogin()">
        <span id="login-btn-text">Masuk & Mulai Chat</span>
      </button>
    </div>
    <p style="color: var(--text-muted); font-size: 11px; margin-top: 16px;">&copy; 2026 AZRA-CHAT. Secure & Encrypted.</p>
  </div>

  <!-- ========== CHAT SCREEN ========== -->
  <div id="chat-screen" class="screen">
    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-avatar" id="my-avatar">A</div>
        <div class="sidebar-userinfo">
          <div class="sidebar-use
