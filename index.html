<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZRA-X - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .login-container {
            display: flex;
            width: 900px;
            height: 550px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-left {
            flex: 1;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .login-left::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="rgba(255,255,255,0.05)"><polygon points="50,0 100,50 50,100 0,50"/></svg>');
            animation: float 20s infinite linear;
        }

        @keyframes float {
            from { transform: translateX(0) translateY(0) rotate(0deg); }
            to { transform: translateX(-100px) translateY(-100px) rotate(360deg); }
        }

        .logo-container {
            position: relative;
            z-index: 1;
            margin-bottom: 30px;
        }

        .logo-large {
            width: 120px;
            height: 120px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            font-size: 50px;
            font-weight: bold;
            color: #6a11cb;
        }

        .app-name {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #fff, #e0e0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .app-tagline {
            font-size: 16px;
            opacity: 0.9;
            max-width: 300px;
        }

        .login-right {
            flex: 1;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-title {
            font-size: 28px;
            margin-bottom: 10px;
            color: #fff;
        }

        .login-subtitle {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #ddd;
        }

        .form-input {
            width: 100%;
            padding: 14px 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #6a11cb;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 0 2px rgba(106, 17, 203, 0.3);
        }

        .login-button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 15px rgba(106, 17, 203, 0.4);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: #aaa;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .divider span {
            padding: 0 15px;
            font-size: 14px;
        }

        .google-login {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .google-login:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
        }

        .google-login i {
            margin-right: 10px;
            font-size: 18px;
            color: #dd4b39;
        }

        .register-link {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #aaa;
        }

        .register-link a {
            color: #6a11cb;
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: rgba(220, 53, 69, 0.2);
            border: 1px solid rgba(220, 53, 69, 0.5);
            color: #ff6b6b;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        @media (max-width: 768px) {
            .login-container {
                flex-direction: column;
                width: 90%;
                height: auto;
            }
            
            .login-left, .login-right {
                padding: 30px;
            }
            
            .login-left {
                padding-bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-left">
            <div class="logo-container">
                <div class="logo-large">AX</div>
                <h1 class="app-name">AZRA-X</h1>
                <p class="app-tagline">Asisten AI canggih dengan teknologi terbaru untuk membantu menyelesaikan tugas Anda</p>
            </div>
        </div>
        
        <div class="login-right">
            <h2 class="login-title">Masuk ke AZRA-X</h2>
            <p class="login-subtitle">Silakan masuk untuk mengakses asisten AI Anda</p>
            
            <div class="error-message" id="errorMessage"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" class="form-input" id="email" placeholder="nama@contoh.com" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">Kata Sandi</label>
                    <input type="password" class="form-input" id="password" placeholder="Masukkan kata sandi" required>
                </div>
                
                <button type="submit" class="login-button">Masuk</button>
            </form>
            
            <div class="divider"><span>atau</span></div>
            
            <button class="google-login" id="googleLogin">
                <i class="fab fa-google"></i> Masuk dengan Google
            </button>
            
            <div class="register-link">
                Belum punya akun? <a href="#" id="registerLink">Daftar di sini</a>
            </div>
        </div>
    </div>

    <script>
        // Konfigurasi Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBvucZ4pFMegkY03qyv48Kzcrgy0a--PnQ",
            authDomain: "azra-x.firebaseapp.com",
            projectId: "azra-x",
            storageBucket: "azra-x.firebasestorage.app",
            messagingSenderId: "920009922182",
            appId: "1:920009922182:web:7d58525426421fcf14e307"
        };

        // Inisialisasi Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // DOM Elements
        const loginForm = document.getElementById('loginForm');
        const googleLogin = document.getElementById('googleLogin');
        const errorMessage = document.getElementById('errorMessage');
        const registerLink = document.getElementById('registerLink');

        // Login dengan email dan password
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    // Login berhasil
                    window.location.href = 'index2.html';
                })
                .catch((error) => {
                    // Tampilkan pesan error
                    showError(error.message);
                });
        });

        // Login dengan Google
        googleLogin.addEventListener('click', () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            
            auth.signInWithPopup(provider)
                .then((result) => {
                    // Login berhasil
                    window.location.href = 'chat.html';
                })
                .catch((error) => {
                    // Tampilkan pesan error
                    showError(error.message);
                });
        });

        // Daftar akun baru
        registerLink.addEventListener('click', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                showError('Harap isi email dan kata sandi untuk mendaftar');
                return;
            }
            
            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    // Pendaftaran berhasil
                    window.location.href = 'chat.html';
                })
                .catch((error) => {
                    // Tampilkan pesan error
                    showError(error.message);
                });
        });

        // Fungsi untuk menampilkan pesan error
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            
            // Sembunyikan pesan error setelah 5 detik
            setTimeout(() => {
                errorMessage.style.display = 'none';
            }, 5000);
        }

        // Cek status login
        auth.onAuthStateChanged((user) => {
            if (user) {
                // Jika sudah login, arahkan ke halaman chat
                window.location.href = 'chat.html';
            }
        });
    </script>
</body>
</html>
